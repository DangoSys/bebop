repos:
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format (C/C++)
        language: system
        entry: bash tools/pre-commit-clang-format.sh
        types_or: [c, c++]
        files: \.(c|h|cc|cpp|cxx|hpp|hxx)$

      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false
