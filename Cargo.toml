[workspace]
members = [".", "src/wasm", "src/tauri/src-tauri"]
resolver = "2"

[package]
name = "bebop"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "bebop"
path = "src/main.rs"

[lib]
name = "bemu"
crate-type = ["rlib", "cdylib", "staticlib"]

[features]
gui = ["dep:bebop-tauri-lib"]

[dependencies]
clap = { version = "4", features = ["derive"] }
libc = "0.2"
log = "0.4"
env_logger = "0.11"
nix = { version = "0.29", features = ["fs", "mman"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
bebop-tauri-lib = { path = "src/tauri/src-tauri", optional = true }
