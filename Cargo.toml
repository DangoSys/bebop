[workspace]
members = ["."]
resolver = "2"

[package]
name = "bebop"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "bebop"
path = "src/main.rs"

[lib]
name = "bemu"
crate-type = ["rlib", "cdylib", "staticlib"]

[features]
default = ["verilator"]
verilator = []

[dependencies]
clap = { version = "4", features = ["derive"] }
libc = "0.2"
log = "0.4"
env_logger = "0.11"
nix = { version = "0.29", features = ["fs", "mman", "signal", "process"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
ctrlc = "3"
