[workspace]
members = [".", "src/nodes/verilator", "src/nodes/bemu", "src/nodes/p2e"]
resolver = "2"

[package]
name = "bebop"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "bebop"
path = "src/main.rs"

[[test]]
name = "elf_bemu"
path = "tests/elf_bemu.rs"
harness = false
required-features = ["bemu"]

[[test]]
name = "elf_verilator"
path = "tests/elf_verilator.rs"
harness = false
required-features = ["verilator"]

[features]
default = []
verilator = ["dep:bebop-verilator"]
bemu = ["dep:bebop-bemu"]
p2e = ["dep:bebop-p2e"]
build-bitstream = ["bebop-p2e?/build-bitstream"]

[dependencies]
bebop-verilator = { path = "src/nodes/verilator", optional = true }
bebop-bemu = { path = "src/nodes/bemu", optional = true }
bebop-p2e = { path = "src/nodes/p2e", optional = true }
clap = { version = "4", features = ["derive"] }
libc = "0.2"
log = "0.4"
env_logger = "0.11"
nix = { version = "0.29", features = ["fs", "mman", "signal", "process"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
ctrlc = "3"
camino = "1.1"
snafu = "0.8"

[dev-dependencies]
libtest-mimic = "0.8"
assert_cmd = "2"
walkdir = "2"
predicates = "3"
serde_json = "1"
