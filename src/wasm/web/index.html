<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bebop wasm demo</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #1e1e2e; color: #cdd6f4; }
    button { margin: 0.5rem; padding: 0.5rem 1rem; background: #89b4fa; border: none; border-radius: 4px; cursor: pointer; }
    input { padding: 0.5rem; background: #313244; color: #cdd6f4; border: 1px solid #89b4fa; border-radius: 4px; }
    #output { margin-top: 1rem; padding: 1rem; background: #313244; border-radius: 4px; min-height: 2rem; }
  </style>
</head>
<body>
  <h2>bebop wasm demo</h2>

  <button id="btn-hello">hello world</button>
  <br>
  <input id="name-input" type="text" placeholder="enter name">
  <button id="btn-greet">greet</button>

  <div id="output"></div>

  <script type="module">
    import init, { hello_world, greet } from './pkg/bebop_wasm.js';

    await init();

    const output = document.getElementById('output');

    document.getElementById('btn-hello').onclick = () => {
      output.textContent = hello_world();
    };

    document.getElementById('btn-greet').onclick = () => {
      const name = document.getElementById('name-input').value || 'stranger';
      output.textContent = greet(name);
    };
  </script>
</body>
</html>
