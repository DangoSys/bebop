# =============================================================================
# Nextest configuration for bebop RTL regression
# =============================================================================
#
# Architecture:
#   test_bemu      → lightweight emulator tests  → parallel, 300s timeout
#   test_verilator → heavyweight RTL simulation  → serial,   1800s timeout
#   test_bank_hash_difftest → BEMU/RTL hash diff → serial,   2400s timeout
#   test_p2e       → fpga workload tests         → serial,   1800s timeout
#
# Filter strategy:
#   Use binary() filters to match by test binary name, not test name.
#   binary(test_verilator) matches ALL tests in the test_verilator binary.
#   binary(test_bemu)      matches ALL tests in the test_bemu binary.
#   binary(test_bank_hash_difftest) matches ALL tests in the bank hash difftest binary.
#   binary(test_p2e)       matches ALL tests in the test_p2e binary.
#
# Timeout strategy:
#   slow-timeout = { period = "Xs", terminate-after = N }
#   → after X seconds, mark as "slow"
#   → after X * N seconds, terminate the test process
#   This is the only timeout mechanism in nextest.

# =============================================================================
# Default profile (cargo nextest run, no -P flag)
# =============================================================================
[profile.default]
failure-output = "immediate"
success-output = "never"
status-level = "all"
fail-fast = false
# 60s * 5 = 300s hard timeout
slow-timeout = { period = "60s", terminate-after = 5 }
retries = 0
junit = { path = "target/nextest/junit-bebop-default.xml", report-name = "bebop-default" }

[test-groups.p2e-serial]
max-threads = 1

[test-groups.verilator-serial]
max-threads = 1

# =============================================================================
# Default profile overrides
# =============================================================================

# Verilator: serial execution, 360s * 5 = 1800s (30min) hard timeout
[[profile.default.overrides]]
filter = "binary(test_verilator)"
test-group = "verilator-serial"
slow-timeout = { period = "360s", terminate-after = 5 }

# Bemu: parallel execution, 60s * 5 = 300s hard timeout
[[profile.default.overrides]]
filter = "binary(test_bemu)"
slow-timeout = { period = "60s", terminate-after = 5 }

# Bank Hash Difftest: serial execution, 480s * 5 = 2400s (40min) hard timeout
[[profile.default.overrides]]
filter = "binary(test_bank_hash_difftest)"
test-group = "verilator-serial"
slow-timeout = { period = "480s", terminate-after = 5 }

# P2E: serial execution, 360s * 5 = 1800s (30min) hard timeout
[[profile.default.overrides]]
filter = "binary(test_p2e)"
test-group = "p2e-serial"
slow-timeout = { period = "360s", terminate-after = 5 }

# =============================================================================
# CI profile (cargo nextest run -P ci)
# =============================================================================
[profile.ci]
fail-fast = false
retries = 1
failure-output = "immediate-final"
success-output = "never"
status-level = "all"
junit = { path = "target/nextest/junit-bebop-ci.xml", report-name = "bebop-regression" }
slow-timeout = { period = "120s", terminate-after = 5 }

[[profile.ci.overrides]]
filter = "binary(test_verilator)"
test-group = "verilator-serial"
slow-timeout = { period = "360s", terminate-after = 5 }
retries = 1

[[profile.ci.overrides]]
filter = "binary(test_bemu)"
slow-timeout = { period = "60s", terminate-after = 5 }
retries = 1

[[profile.ci.overrides]]
filter = "binary(test_bank_hash_difftest)"
test-group = "verilator-serial"
slow-timeout = { period = "480s", terminate-after = 5 }
retries = 1

[[profile.ci.overrides]]
filter = "binary(test_p2e)"
test-group = "p2e-serial"
slow-timeout = { period = "360s", terminate-after = 5 }
retries = 1

# =============================================================================
# Dev profile (cargo nextest run -P dev)
# =============================================================================
[profile.dev]
fail-fast = false
retries = 0
failure-output = "immediate"
success-output = "never"
status-level = "fail"
# 30s * 3 = 90s hard timeout (fast feedback for developers)
slow-timeout = { period = "30s", terminate-after = 3 }

[[profile.dev.overrides]]
filter = "binary(test_verilator)"
test-group = "verilator-serial"
# 360s * 5 = 1800s (30min) for verilator
slow-timeout = { period = "360s", terminate-after = 5 }

[[profile.dev.overrides]]
filter = "binary(test_bemu)"
slow-timeout = { period = "30s", terminate-after = 3 }

[[profile.dev.overrides]]
filter = "binary(test_bank_hash_difftest)"
test-group = "verilator-serial"
slow-timeout = { period = "480s", terminate-after = 5 }

[[profile.dev.overrides]]
filter = "binary(test_p2e)"
test-group = "p2e-serial"
slow-timeout = { period = "360s", terminate-after = 5 }
