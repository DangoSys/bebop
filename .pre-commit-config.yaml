repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false

      - id: clang-format
        name: clang-format (C/C++)
        entry: clang-format -i
        language: system
        files: \.(c|h|cc|cpp|cxx|hpp|hxx)$
